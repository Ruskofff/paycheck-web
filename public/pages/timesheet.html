<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayCheck — Journal des heures</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<nav id="sidebar">
  <div class="logo">💰 PayCheck</div>
  <a href="/pages/dashboard.html"><span class="icon">🏠</span> Dashboard</a>
  <a href="/pages/job.html?id=1"><span class="icon">💼</span> Job A</a>
  <a href="/pages/job.html?id=2"><span class="icon">💼</span> Job B</a>
  <a href="/pages/quota.html"><span class="icon">⏱️</span> Quota 650h</a>
  <a href="/pages/timesheet.html" class="active"><span class="icon">📋</span> Journal</a>
</nav>

<main id="content">
  <h1>Journal des heures</h1>
  <p class="subtitle">Saisie manuelle pour vérification avec tes fiches</p>
  <div id="alerts"></div>

  <!-- Formulaire saisie -->
  <div class="card">
    <h2>Ajouter une journée</h2>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group">
        <label>Job</label>
        <select id="entry-job">
          <option value="1">Job A</option>
          <option value="2">Job B</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="entry-date" />
      </div>
      <div class="form-group">
        <label>Pointage (arrivée)</label>
        <input type="time" id="entry-time-start" />
      </div>
      <div class="form-group">
        <label>Dépointage (départ)</label>
        <input type="time" id="entry-time-end" />
      </div>
      <div class="form-group">
        <label>Pause (minutes)</label>
        <input type="number" id="entry-break" min="0" max="480" step="5" placeholder="ex: 30" style="width:110px" value="0" />
      </div>
    </div>
    <div class="form-row" style="align-items:center">
      <div class="form-group">
        <label>Note (optionnel)</label>
        <input type="text" id="entry-note" placeholder="ex: remplacement" style="width:220px" />
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding-top:18px">
        <span id="hours-preview" style="font-size:15px;font-weight:600;color:var(--primary)"></span>
        <button class="btn btn-primary" id="btn-add-entry">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- Filtre par job -->
  <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
    <span style="font-weight:600;font-size:13px">Afficher :</span>
    <button class="btn btn-primary" data-job="all" id="filter-all">Tous</button>
    <button class="btn btn-ghost" data-job="1" id="filter-a">Job A</button>
    <button class="btn btn-ghost" data-job="2" id="filter-b">Job B</button>
  </div>

  <!-- Tableau -->
  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Job</th>
            <th>Pointage</th>
            <th>Dépointage</th>
            <th>Pause</th>
            <th>Heures</th>
            <th>Note</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="timesheet-tbody">
          <tr><td colspan="5" class="empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/timesheet.js"></script>
</body>
</html>
